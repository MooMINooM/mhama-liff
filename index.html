<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบมะหมา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #FFF5E4; color: #4a4a4a; }
    .header-bg { background: linear-gradient(135deg, #FF9494 0%, #FFD1D1 100%); padding: 30px 20px 20px; border-radius: 0 0 30px 30px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 4px solid white; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .card-custom { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; overflow: hidden; }
    .btn-custom { background-color: #FF7E67; color: white; border-radius: 25px; padding: 10px; font-weight: 500; border: none; width: 100%; transition: 0.3s; }
    .btn-custom:hover { background-color: #E56B55; color: white; }
    .pet-card { border-left: 5px solid #FF9494; background-color: #FAFAFA; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
    /* แก้ไขหน้าโหลดให้อยู่ตรงกลางและซ่อนได้ */
    #loading { margin-top: 30vh; } 
  </style>
</head>
<body>

  <div id="loading" class="text-center">
    <div class="spinner-border text-danger" style="width: 3rem; height: 3rem;" role="status"></div>
    <h5 class="mt-3 text-secondary">กำลังเชื่อมต่อระบบ...</h5>
  </div>

  <div id="mainContent" style="display: none;">
    <div id="welcomeBox" style="display: none;">
      <div class="header-bg text-center">
        <img id="userImg" src="https://via.placeholder.com/90" class="profile-img mb-2" alt="Profile">
        <h4 class="fw-bold">สวัสดีคุณ <span id="welcomeName"></span></h4>
        <p class="mb-0"><i class="fa-solid fa-paw"></i> ยินดีต้อนรับสู่ระบบมะหมา</p>
      </div>

      <div class="container mt-4">
        <h5 class="fw-bold mb-3"><i class="fa-solid fa-cat"></i> สัตว์เลี้ยงของคุณ</h5>
        <div id="petListContainer"></div>

        <div class="row mt-4">
          <div class="col-6">
            <button class="btn btn-custom" onclick="showBookingForm()"><i class="fa-solid fa-calendar-check"></i> จองคิว</button>
          </div>
          <div class="col-6">
            <button class="btn btn-custom" style="background-color: #6C5B7B;"><i class="fa-solid fa-clock-rotate-left"></i> ประวัติ</button>
          </div>
        </div>
      </div>
    </div>

    <div id="bookingBox" class="container mt-4" style="display: none;">
      <div class="card card-custom p-4">
        <h5 class="fw-bold text-center mb-4" style="color: #FF7E67;"><i class="fa-solid fa-syringe"></i> นัดหมายฉีดวัคซีน</h5>
        <form id="bookingForm">
          <div class="mb-3">
            <label class="form-label text-secondary">เลือกสัตว์เลี้ยง</label>
            <select class="form-select" id="bookPetId" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary">วันที่นัดหมาย</label>
            <input type="date" class="form-control" id="bookDate" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary">สถานที่รับบริการ</label>
            <select class="form-select" id="bookLocation" required>
              <option value="" disabled selected>-- เลือกสถานที่ --</option>
              <option value="บ้าน">บ้าน</option>
              <option value="อาคารสัตวแพทย์ เทศบาลเมืองสีคิ้ว">อาคารสัตวแพทย์ เทศบาลเมืองสีคิ้ว</option>
            </select>
          </div>
          <button type="submit" class="btn btn-custom mt-2" id="btnBook">ยืนยันการจองคิว</button>
          <button type="button" class="btn btn-light w-100 mt-2" onclick="hideBookingForm()" style="border-radius: 25px;">ยกเลิก</button>
        </form>
      </div>
    </div>

    <div id="registerBox" class="container mt-4 mb-5" style="display: none;">
      <div class="card card-custom p-4">
        <h4 class="text-center mb-4 fw-bold" style="color: #FF9494;">📝 สมัครสมาชิก</h4>
        <form id="registerForm">
          <input type="hidden" id="lineId"><input type="hidden" id="imgUrl">
          
          <h6 class="text-secondary fw-bold border-bottom pb-2">👤 ข้อมูลเจ้าของ</h6>
          
          <div class="row mb-2">
            <div class="col-4 pe-1">
              <select class="form-select" id="ownerPrefix" required>
                <option value="" disabled selected>คำนำหน้า</option>
                <option value="นาย">นาย</option>
                <option value="นาง">นาง</option>
                <option value="นางสาว">นางสาว</option>
              </select>
            </div>
            <div class="col-8 ps-1">
              <input type="text" class="form-control" id="ownerName" placeholder="ชื่อ-นามสกุล *" required>
            </div>
          </div>
          
          <div class="mb-2"><input type="tel" class="form-control" id="ownerPhone" placeholder="เบอร์โทรศัพท์ *" required></div>
          
          <div class="mb-2">
            <input type="text" class="form-control" id="addressNo" placeholder="บ้านเลขที่ / หมู่ / ซอย *" required>
          </div>
          <div class="row mb-2">
            <div class="col-6 pe-1"><input type="text" class="form-control" id="subdistrict" placeholder="ตำบล *" required></div>
            <div class="col-6 ps-1"><input type="text" class="form-control" id="district" placeholder="อำเภอ *" required></div>
          </div>
          <div class="row mb-4">
            <div class="col-6 pe-1"><input type="text" class="form-control" id="province" placeholder="จังหวัด *" required></div>
            <div class="col-6 ps-1"><input type="text" class="form-control" id="zipcode" placeholder="รหัสไปรษณีย์ *" required></div>
          </div>

          <h6 class="text-secondary fw-bold border-bottom pb-2">🐶 ข้อมูลสัตว์เลี้ยง</h6>
          <div class="mb-2"><input type="text" class="form-control" id="petName" placeholder="ชื่อสัตว์เลี้ยง *" required></div>
          
          <div class="mb-2">
            <select class="form-select" id="petType" required>
              <option value="" disabled selected>-- เลือกชนิดสัตว์เลี้ยง * --</option>
              <option value="สุนัข">สุนัข</option>
              <option value="แมว">แมว</option>
              <option value="กระต่าย">กระต่าย</option>
              <option value="นก">นก</option>
              <option value="อื่นๆ">อื่นๆ</option>
            </select>
          </div>
          
          <div class="mb-3"><input type="text" class="form-control" id="petAge" placeholder="อายุ (เช่น 2 ปี 3 เดือน)"></div>

          <button type="submit" class="btn btn-custom mt-2" id="btnRegister">บันทึกข้อมูล</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ สำคัญ: ใส่ LIFF ID และ API URL ของคุณตรงนี้
    const MY_LIFF_ID = "2009865878-gGwvEodo"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbz4HSnOhRCVfUWPA_qH9HiegfwX-R4jK8BIwaEAQFZ7iTImV2CsCmwoKDndseOTz2wp5Q/exec";
    
    let currentLineId = "";

    async function startApp() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        currentLineId = profile.userId;
        document.getElementById("lineId").value = profile.userId;
        document.getElementById("imgUrl").value = profile.pictureUrl;
        document.getElementById("userImg").src = profile.pictureUrl || "https://via.placeholder.com/90";

        // ป้องกันแคชด้วยการเติมเวลาต่อท้าย
        const fetchUrl = API_URL + "?lineId=" + profile.userId + "&t=" + new Date().getTime();
        const response = await fetch(fetchUrl, { method: 'GET', redirect: 'follow' });
        const data = await response.json();

        // ซ่อนหน้าโหลด และโชว์เนื้อหาหลัก
        document.getElementById("loading").style.display = "none";
        document.getElementById("mainContent").style.display = "block";

        if (data.status === "found") {
          document.getElementById("welcomeBox").style.display = "block";
          document.getElementById("welcomeName").innerText = data.name;
          
          const petList = document.getElementById("petListContainer");
          const petSelect = document.getElementById("bookPetId");
          if(data.pets && data.pets.length > 0) {
            data.pets.forEach(pet => {
              petList.innerHTML += `
                <div class="pet-card shadow-sm">
                  <h5 class="mb-1 fw-bold text-dark">${pet.petName}</h5>
                  <small class="text-muted">ชนิด: ${pet.petType} | อายุ: ${pet.petAge}</small>
                </div>
              `;
              petSelect.innerHTML += `<option value="${pet.petId}">${pet.petName}</option>`;
            });
          }
        } else {
          document.getElementById("registerBox").style.display = "block";
        }
      } catch (err) {
        Swal.fire('ข้อผิดพลาด', err.message, 'error');
      }
    }

    function showBookingForm() {
      document.getElementById("welcomeBox").style.display = "none";
      document.getElementById("bookingBox").style.display = "block";
    }
    function hideBookingForm() {
      document.getElementById("bookingBox").style.display = "none";
      document.getElementById("welcomeBox").style.display = "block";
    }

    // ฟังก์ชันส่งข้อมูลลงทะเบียน
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      document.getElementById("btnRegister").innerHTML = "กำลังบันทึก...";
      
      // นำคำนำหน้า + ชื่อ มาต่อกัน
      const fullName = document.getElementById("ownerPrefix").value + document.getElementById("ownerName").value;
      
      // นำที่อยู่ทั้งหมดมาต่อกันให้เป็นข้อความเดียว
      const fullAddress = document.getElementById("addressNo").value + " ต." + document.getElementById("subdistrict").value + 
                          " อ." + document.getElementById("district").value + " จ." + document.getElementById("province").value + 
                          " " + document.getElementById("zipcode").value;

      const formData = {
        action: "register",
        lineId: document.getElementById("lineId").value,
        imgUrl: document.getElementById("imgUrl").value,
        ownerName: fullName, // ส่งชื่อที่รวมแล้ว
        ownerPhone: document.getElementById("ownerPhone").value,
        ownerAddress: fullAddress, // ส่งที่อยู่ที่รวมแล้ว
        petName: document.getElementById("petName").value,
        petType: document.getElementById("petType").value,
        petAge: document.getElementById("petAge").value
      };

      try {
        const res = await fetch(API_URL, { 
          method: "POST", 
          body: JSON.stringify(formData),
          headers: { "Content-Type": "text/plain;charset=utf-8" }
        });
        const result = await res.json();
        if (result.status === "success") {
          Swal.fire('สำเร็จ!', 'ลงทะเบียนเรียบร้อย', 'success').then(() => window.location.reload());
        }
      } catch (err) { Swal.fire('Error', 'เชื่อมต่อขัดข้อง', 'error'); }
    });

    // ฟังก์ชันส่งข้อมูลจองคิว
    document.getElementById("bookingForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      document.getElementById("btnBook").innerHTML = "กำลังจองคิว...";
      
      const formData = {
        action: "book",
        lineId: currentLineId,
        petId: document.getElementById("bookPetId").value,
        date: document.getElementById("bookDate").value,
        location: document.getElementById("bookLocation").value
      };

      try {
        const res = await fetch(API_URL, { 
          method: "POST", 
          body: JSON.stringify(formData),
          headers: { "Content-Type": "text/plain;charset=utf-8" }
        });
        const result = await res.json();
        if (result.status === "success") {
          Swal.fire({
            title: 'จองคิวสำเร็จ!',
            html: `คุณได้คิวที่ <b style="font-size: 24px; color: #FF7E67;">${result.queueNo}</b><br>กรุณารอรับบริการตามวันและสถานที่ที่นัดหมาย`,
            icon: 'success'
          }).then(() => window.location.reload());
        }
      } catch (err) { Swal.fire('Error', 'เชื่อมต่อขัดข้อง', 'error'); }
    });

    window.onload = startApp;
  </script>
</body>
</html>
