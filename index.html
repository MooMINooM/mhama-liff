<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบมะหมา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
    .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="container mt-4">
    <div id="loading" class="text-center mt-5">
      <div class="spinner-border text-primary" role="status"></div>
      <h5 class="mt-3" id="statusText">กำลังเชื่อมต่อระบบ...</h5>
    </div>

    <div id="welcomeBox" class="card p-4 text-center mt-3" style="display: none;">
      <h3 class="text-success">✅ เข้าสู่ระบบสำเร็จ</h3>
      <h5 id="welcomeName" class="mt-3"></h5>
    </div>

    <div id="registerBox" class="card p-4 mt-3" style="display: none;">
      <h4 class="text-center mb-4 text-primary">📝 ลงทะเบียนสมาชิกใหม่</h4>
      <form id="registerForm">
        
        <input type="hidden" id="lineId">
        <input type="hidden" id="imgUrl">

        <h6 class="text-secondary fw-bold">👤 ข้อมูลเจ้าของสัตว์เลี้ยง</h6>
        <div class="mb-3">
          <label class="form-label">ชื่อ-สกุล <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="ownerName" required>
        </div>
        <div class="mb-3">
          <label class="form-label">เบอร์โทรศัพท์ <span class="text-danger">*</span></label>
          <input type="tel" class="form-control" id="ownerPhone" required>
        </div>
        <div class="mb-3">
          <label class="form-label">ที่อยู่ <span class="text-danger">*</span></label>
          <textarea class="form-control" id="ownerAddress" rows="2" required></textarea>
        </div>

        <hr>

        <h6 class="text-secondary fw-bold">🐶 ข้อมูลสัตว์เลี้ยง</h6>
        <div class="mb-3">
          <label class="form-label">ชื่อสัตว์เลี้ยง <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="petName" required>
        </div>
        <div class="mb-3">
          <label class="form-label">ชนิด (เช่น สุนัข, แมว) <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="petType" required>
        </div>
        <div class="mb-3">
          <label class="form-label">อายุ (เช่น 2 ปี 3 เดือน)</label>
          <input type="text" class="form-control" id="petAge">
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2" id="btnSubmit">บันทึกข้อมูล</button>
      </form>
    </div>
  </div>

  <script>
    // ⚠️ อย่าลืมใส่ LIFF ID และ API URL ของคุณกลับเข้าไปตรงนี้นะครับ!
    const MY_LIFF_ID = "2009865878-gGwvEodo"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbz4HSnOhRCVfUWPA_qH9HiegfwX-R4jK8BIwaEAQFZ7iTImV2CsCmwoKDndseOTz2wp5Q/exec";

    async function startApp() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        document.getElementById("lineId").value = profile.userId;
        document.getElementById("imgUrl").value = profile.pictureUrl;
        
        document.getElementById("statusText").innerText = "กำลังตรวจสอบข้อมูล...";

        // เช็กข้อมูล
        const response = await fetch(API_URL + "?lineId=" + profile.userId);
        const data = await response.json();

        document.getElementById("loading").style.display = "none";

        if (data.status === "found") {
          document.getElementById("welcomeBox").style.display = "block";
          document.getElementById("welcomeName").innerText = "สวัสดีคุณ " + data.name;
        } else {
          document.getElementById("registerBox").style.display = "block";
        }
      } catch (err) {
        Swal.fire('ข้อผิดพลาด', err.message, 'error');
      }
    }

    // ฟังก์ชันเมื่อกดปุ่ม "บันทึกข้อมูล"
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault(); // ป้องกันไม่ให้เว็บรีเฟรช
      
      const btn = document.getElementById("btnSubmit");
      btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...`;
      btn.disabled = true;

      // รวบรวมข้อมูลจากฟอร์ม
      const formData = {
        lineId: document.getElementById("lineId").value,
        imgUrl: document.getElementById("imgUrl").value,
        ownerName: document.getElementById("ownerName").value,
        ownerPhone: document.getElementById("ownerPhone").value,
        ownerAddress: document.getElementById("ownerAddress").value,
        petName: document.getElementById("petName").value,
        petType: document.getElementById("petType").value,
        petAge: document.getElementById("petAge").value
      };

      try {
        // ส่งข้อมูลไปบันทึก (POST Request)
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(formData),
          headers: { "Content-Type": "text/plain;charset=utf-8" } // ใช้ text/plain เพื่อเลี่ยงการบล็อก CORS ของ Google
        });
        
        const result = await response.json();

        if (result.status === "success") {
          Swal.fire('สำเร็จ!', 'ลงทะเบียนเรียบร้อยแล้ว', 'success').then(() => {
            // รีเฟรชหน้าเว็บเพื่อให้มันไปดึงหน้าต้อนรับมาแสดง
            window.location.reload(); 
          });
        } else {
          Swal.fire('เกิดข้อผิดพลาด', result.message, 'error');
          btn.innerHTML = "บันทึกข้อมูล";
          btn.disabled = false;
        }
      } catch (err) {
        Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
        btn.innerHTML = "บันทึกข้อมูล";
        btn.disabled = false;
      }
    });

    window.onload = startApp;
  </script>
</body>
</html>
