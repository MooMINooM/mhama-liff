<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบมะหมา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-light">

  <div class="container mt-5 text-center">
    <div id="loading" class="spinner-border text-primary" role="status"></div>
    <h4 id="statusText" class="mt-3">กำลังเข้าสู่ระบบ...</h4>
    <div id="resultBox" class="mt-4" style="display: none;"></div>
  </div>

  <script>
    // ⚠️ 1. ใส่ LIFF ID ของคุณ
    const MY_LIFF_ID = "2009865878-gGwvEodo"; 
    
    // ⚠️ 2. ใส่ API URL (ลิงก์ Web app /exec) ที่ได้จากสเต็ป 1
    const API_URL = "https://script.google.com/macros/s/AKfycbz4HSnOhRCVfUWPA_qH9HiegfwX-R4jK8BIwaEAQFZ7iTImV2CsCmwoKDndseOTz2wp5Q/exec";

    async function startApp() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        document.getElementById("statusText").innerText = "กำลังตรวจสอบข้อมูล...";

        // ใช้คำสั่ง fetch เพื่อคุยกับ Google Sheets แทน google.script.run
        const response = await fetch(API_URL + "?lineId=" + profile.userId);
        const data = await response.json();

        document.getElementById("loading").style.display = "none";
        document.getElementById("resultBox").style.display = "block";

        if (data.status === "found") {
          document.getElementById("statusText").innerText = "✅ เข้าสู่ระบบสำเร็จ!";
          document.getElementById("resultBox").innerHTML = `<h3 class="text-success">สวัสดีคุณ ${data.name}</h3>`;
        } else {
          document.getElementById("statusText").innerText = "📝 กรุณาลงทะเบียน";
          document.getElementById("resultBox").innerHTML = `<p>ไม่พบข้อมูลในระบบ (เดี๋ยวเราจะเอาฟอร์มมาใส่ตรงนี้)</p>`;
        }

      } catch (err) {
        document.getElementById("statusText").innerHTML = `<span class="text-danger">เกิดข้อผิดพลาด: ${err.message}</span>`;
      }
    }

    window.onload = startApp;
  </script>
</body>
</html>
